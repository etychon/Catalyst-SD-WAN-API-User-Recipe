<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 450" role="img" aria-labelledby="title desc">
  <title id="title">Repository map</title>
  <desc id="desc">How README, documentation, recipes, reference, and samples relate in this repository.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="currentColor"/>
    </marker>
    <style>
      .box { fill: none; stroke: currentColor; stroke-width: 2; rx: 8; }
      .label { font-family: system-ui, sans-serif; font-size: 14px; fill: currentColor; }
      .small { font-size: 12px; }
      .arrow { stroke: currentColor; stroke-width: 2; fill: none; marker-end: url(#arrow); }
    </style>
  </defs>
  <rect class="box" x="300" y="20" width="200" height="56"/>
  <text class="label" x="400" y="44" text-anchor="middle">README.md</text>
  <text class="label small" x="400" y="62" text-anchor="middle">Welcome and index</text>

  <rect class="box" x="280" y="110" width="240" height="56"/>
  <text class="label" x="400" y="134" text-anchor="middle">docs/START-HERE.md</text>
  <text class="label small" x="400" y="152" text-anchor="middle">Guided tour for humans</text>

  <line class="arrow" x1="400" y1="76" x2="400" y2="110"/>

  <rect class="box" x="40" y="210" width="160" height="72"/>
  <text class="label" x="120" y="238" text-anchor="middle">Foundation</text>
  <text class="label small" x="120" y="256" text-anchor="middle">0002 guides</text>
  <text class="label small" x="120" y="272" text-anchor="middle">Auth, scale</text>

  <rect class="box" x="220" y="210" width="160" height="72"/>
  <text class="label" x="300" y="238" text-anchor="middle">Recipes</text>
  <text class="label small" x="300" y="256" text-anchor="middle">Use-case workflows</text>
  <text class="label small" x="300" y="272" text-anchor="middle">docs/recipes/</text>

  <rect class="box" x="400" y="210" width="160" height="72"/>
  <text class="label" x="480" y="238" text-anchor="middle">Extended guides</text>
  <text class="label small" x="480" y="256" text-anchor="middle">Architecture,</text>
  <text class="label small" x="480" y="272" text-anchor="middle">security, fields</text>

  <rect class="box" x="580" y="210" width="180" height="72"/>
  <text class="label" x="670" y="238" text-anchor="middle">Reference</text>
  <text class="label small" x="670" y="256" text-anchor="middle">Glossary, API index</text>
  <text class="label small" x="670" y="272" text-anchor="middle">docs/reference/</text>

  <line class="arrow" x1="360" y1="166" x2="120" y2="210"/>
  <line class="arrow" x1="400" y1="166" x2="300" y2="210"/>
  <line class="arrow" x1="440" y1="166" x2="480" y2="210"/>
  <line class="arrow" x1="480" y1="166" x2="670" y2="210"/>

  <rect class="box" x="260" y="330" width="280" height="72"/>
  <text class="label" x="400" y="358" text-anchor="middle">samples/scripts/</text>
  <text class="label small" x="400" y="376" text-anchor="middle">Runnable Python examples</text>
  <text class="label small" x="400" y="392" text-anchor="middle">Try recipes in your lab</text>

  <line class="arrow" x1="300" y1="282" x2="360" y2="330"/>
  <line class="arrow" x1="480" y1="282" x2="440" y2="330"/>
</svg>
