<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 320" role="img" aria-labelledby="title desc">
  <title id="title">Monitoring data flow</title>
  <desc id="desc">Edge devices report to SD-WAN Manager; collectors pull data into stores and dashboards.</desc>
  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto">
      <path d="M0,0 L8,4 L0,8 Z" fill="currentColor"/>
    </marker>
    <style>
      .box { fill: none; stroke: currentColor; stroke-width: 2; rx: 8; }
      .label { font-family: system-ui, sans-serif; font-size: 14px; fill: currentColor; }
      .small { font-size: 12px; }
      .arrow { stroke: currentColor; stroke-width: 2; fill: none; marker-end: url(#arrow); }
      .dashed { stroke-dasharray: 6 4; }
    </style>
  </defs>
  <rect class="box" x="20" y="120" width="140" height="80"/>
  <text class="label" x="90" y="152" text-anchor="middle">Edge devices</text>
  <text class="label small" x="90" y="172" text-anchor="middle">Sites, routers</text>
  <text class="label small" x="90" y="188" text-anchor="middle">WAN, cellular</text>

  <rect class="box" x="200" y="100" width="160" height="120"/>
  <text class="label" x="280" y="132" text-anchor="middle">SD-WAN Manager</text>
  <text class="label small" x="280" y="152" text-anchor="middle">Inventory, health,</text>
  <text class="label small" x="280" y="168" text-anchor="middle">alarms, config</text>
  <text class="label small" x="280" y="184" text-anchor="middle">Central visibility</text>

  <rect class="box" x="400" y="120" width="140" height="80"/>
  <text class="label" x="470" y="152" text-anchor="middle">Collector</text>
  <text class="label small" x="470" y="172" text-anchor="middle">Scripts or ETL</text>
  <text class="label small" x="470" y="188" text-anchor="middle">Scheduled jobs</text>

  <rect class="box" x="580" y="80" width="120" height="60"/>
  <text class="label" x="640" y="108" text-anchor="middle">Your store</text>
  <text class="label small" x="640" y="126" text-anchor="middle">Database</text>

  <rect class="box" x="580" y="180" width="120" height="60"/>
  <text class="label" x="640" y="208" text-anchor="middle">Dashboard</text>
  <text class="label small" x="640" y="226" text-anchor="middle">NOC / OT view</text>

  <line class="arrow" x1="160" y1="160" x2="200" y2="160"/>
  <text class="label small" x="180" y="150" text-anchor="middle">state</text>

  <line class="arrow" x1="360" y1="160" x2="400" y2="160"/>
  <text class="label small" x="380" y="150" text-anchor="middle">API</text>

  <line class="arrow" x1="540" y1="145" x2="580" y2="110"/>
  <line class="arrow" x1="540" y1="175" x2="580" y2="210"/>

  <line class="arrow dashed" x1="700" y1="140" x2="700" y2="180"/>
</svg>
